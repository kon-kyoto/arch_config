# Advanced transparency and visual effects configuration

# Background effects
# background_blur 20

# Dim inactive windows and splits
dim_opacity 0.4
inactive_text_alpha 0.8

# Selection transparency
selection_foreground #24283b
selection_background #c0caf5
selection_alpha 0.7

# URL colors with transparency hint
url_color #7aa2f7
url_style curly

# Terminal bell with transparency
visual_bell_color #ff9e64
visual_bell_alpha 0.7

# Cursor with subtle glow
cursor #c0caf5
cursor_text_color #24283b
cursor_beam_thickness 1.8
cursor_underline_thickness 2.0

# Window border effects
active_border_color #7aa2f7
inactive_border_color #3b4261
bell_border_color #ff9e64

# Tab bar transparency
tab_bar_background #1a1b26
tab_bar_alpha 0.9
active_tab_background #7aa2f7
active_tab_alpha 1.0
inactive_tab_background #3b4261
inactive_tab_alpha 0.7

# Mark colors with transparency
mark1_background #ff9e64
mark1_alpha 0.8
mark2_background #7aa2f7
mark2_alpha 0.8
mark3_background #9ece6a
mark3_alpha 0.8

# Performance optimizations for transparency
repaint_delay 10
input_delay 3
sync_to_monitor yes
