include colors.conf
include transparency.conf

# WAYLAND/HYPRLAND
linux_display_server wayland
wayland_titlebar_color #1a1b26

# ПРОЗРАЧНОСТЬ И ФОН
background_opacity 0.9
dynamic_background_opacity no
background #1a1b26
background_tint 0.5
background_blur 5

# УЛУЧШЕНИЯ ЧИТАЕМОСТИ ТЕКСТА
adjust_line_height 100%
adjust_column_width 100%
box_drawing_scale 0.012, 1, 1.5, 2

# ШРИФТЫ
font_family Iosevka Nerd Font 
font_size 11
bold_font auto
italic_font auto
bold_italic_font auto
disable_ligatures never

# АНТИАЛИАСИНГ И ЧЕТКОСТЬ ТЕКСТA
font_features +cv01 +cv02 +cv05 +cv06 +cv09 +cv14 +cv16 +cv18 +cv19 +cv20 +cv21 +cv22 +cv24 +cv25 +cv26 +cv27 +cv28 +cv29 +cv30 +cv31 +cv32 +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +zero
text_font_features +calt

# ОКНО
hide_window_decorations titlebar-only
confirm_os_window_close 0
window_padding_width 10
initial_window_width 1200
initial_window_height 700
remember_window_size yes
placement_strategy center

# ВКЛАДКИ
tab_bar_style powerline
tab_powerline_style round
tab_bar_edge top
tab_bar_margin_height 0.4
tab_title_template "{fmt.fg._7aa2f7}{fmt.bold}{title}{fmt.nobold}"
active_tab_font_style bold-italic
inactive_tab_font_style normal

active_tab_foreground #1a1b26
active_tab_background #7aa2f7
inactive_tab_foreground #a9b1d6
inactive_tab_background #3b4261
tab_bar_background #1a1b26

# КУРСОР
cursor_shape beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor #c0caf5
cursor_text_color #1a1b26

# ЦВЕТА ВЫДЕЛЕНИЯ
selection_foreground #1a1b26
selection_background #c0caf5
visual_bell_duration 0.0
enable_audio_bell no
window_alert_on_bell no

# ПРОИЗВОДИТЕЛЬНОСТЬ
repaint_delay 8
input_delay 2
sync_to_monitor yes
scrollback_lines 25000
wheel_scroll_multiplier 6.0

# МЫШЬ
mouse_hide_wait 2.0
url_color #7aa2f7
url_style double
detect_urls yes
copy_on_select clipboard
strip_trailing_spaces smart
focus_follows_mouse no
pointer_shape_when_grabbed arrow

# УЛУЧШЕНИЯ РЕНДЕРИНГА
macos_thicken_font 0.5
macos_custom_beam_cursor yes
macos_option_as_alt yes
macos_quit_when_last_window_closed no
macos_traditional_fullscreen no
macos_hide_from_tasks no

# ГОРЯЧИЕ КЛАВИШИ
# Размер шрифта с более плавным изменением
map ctrl+plus change_font_size all +0.5
map ctrl+minus change_font_size all -0.5
map ctrl+0 change_font_size all 13.5

# Стандартные
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+r reload_config_file
map ctrl+shift+q close_window
map ctrl+shift+t new_tab
map ctrl+shift+enter new_window

# Навигация
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down

# Прозрачность
map ctrl+shift+u set_background_opacity +0.05
map ctrl+shift+i set_background_opacity -0.05
map ctrl+shift+o set_background_opacity 0.9

# Производительность
symbol_map U+E5FA-U+E62B,U+E700-U+E7C5,U+F000-U+F2E0,U+E200-U+E2A9,U+E300-U+E3E3,U+F400-U+F4A8,U+F500-U+FD46,U+E000-U+E00A,U+F000-U+F003,U+EA60-U+EBEB,U+2665,U+26A1,U+F400-U+F4A9,U+E0A0-U+E0A3,U+E0B0-U+E0D4,U+23FB-U+23FE,U+2B58,U+E000-U+E00D Symbols Nerd Font
